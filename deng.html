<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#11100D">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>心灯 · 问心阁</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="deng">
<main>
  <header class="pagehead fade-up">
    <div class="seal">灯</div>
    <div>
      <h1>心灯</h1>
      <div class="sub">为牵挂的人，点一盏灯</div>
    </div>
  </header>

  <section class="card fade-up">
    <div class="card-title">我的灯墙 <span style="font-size:12px;color:var(--ink-3);font-weight:400" id="wall-count"></span></div>
    <div class="lamp-wall" id="wall"></div>
    <p id="wall-empty" style="font-size:13.5px;color:var(--ink-3)">还没有点过灯。心里惦记谁，就为谁点一盏。</p>
  </section>

  <section class="card fade-up">
    <div class="card-title">点一盏新灯</div>
    <div class="field">
      <label>为谁而点</label>
      <div class="chips" id="who-chips">
        <span class="chip on">家人</span><span class="chip">爱人</span><span class="chip">孩子</span>
        <span class="chip">朋友</span><span class="chip">自己</span>
      </div>
    </div>
    <div class="field">
      <label>名字或称呼（会写在灯上）</label>
      <input type="text" id="who-name" maxlength="8" placeholder="例如：妈妈 / 阿明">
    </div>
    <div class="field">
      <label>选一盏灯</label>
      <div class="lamp-pick" id="lamp-pick"></div>
    </div>
    <div class="field">
      <label>一句心愿（可不填，最多 30 字）</label>
      <input type="text" id="wish" maxlength="30" placeholder="例如：愿你身体康健，万事不愁">
    </div>
    <div class="lamp-preview" id="lamp-preview"></div>
    <button class="btn sha block" id="btn-light">点亮此灯（限免）</button>
  </section>
</main>

<script src="js/core.js"></script>
<script src="js/data.js"></script>
<script src="js/premium.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  let pickedLamp = LAMPS[0];

  function esc(text) {
    return String(text == null ? '' : text).replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[ch]));
  }

  function lampMarkup(l, index, preview) {
    const name = l.name || '未名';
    const wish = l.wish || l.defaultWish || l.lampWish || '愿心有所安，所念有光';
    const lampName = l.lampName || l.name || '';
    const rel = l.rel ? ' · ' + l.rel : '';
    const delay = ((index || 0) % 7) * -0.38;
    return '<div class="wish-lamp' + (preview ? ' preview' : '') + (l.long ? ' long' : '') + '" style="--lamp-color:' + esc(l.color) + ';--delay:' + delay + 's" title="' + esc(wish) + '">' +
      '<div class="lamp-aura"></div>' +
      '<div class="lamp-thread"></div>' +
      '<div class="lantern">' +
        '<div class="lantern-top"></div>' +
        '<div class="lantern-body">' +
          '<span class="lantern-rib rib-a"></span><span class="lantern-rib rib-b"></span>' +
          '<div class="flame"><i></i></div>' +
        '</div>' +
        '<div class="lantern-foot"></div>' +
      '</div>' +
      '<div class="wish-paper">' +
        '<b>' + esc(name) + '</b>' +
        '<span>' + esc(wish) + '</span>' +
        '<small>' + esc(lampName + rel) + '</small>' +
      '</div>' +
    '</div>';
  }

  function previewInput() {
    const name = document.getElementById('who-name').value.trim() || '所念之人';
    const rel = whoChips.querySelector('.chip.on') ? whoChips.querySelector('.chip.on').textContent : '牵挂';
    const wish = document.getElementById('wish').value.trim() || pickedLamp.wish;
    document.getElementById('lamp-preview').innerHTML =
      '<div class="preview-copy"><span>预览</span><b>' + esc(pickedLamp.name) + '</b></div>' +
      lampMarkup({ name, rel, wish, lampName: pickedLamp.name, color: pickedLamp.color, long: pickedLamp.id === 'long' }, 0, true);
  }

  /* 灯种选择 */
  const pickEl = document.getElementById('lamp-pick');
  pickEl.innerHTML = LAMPS.map((l, i) =>
    '<div class="lamp-opt' + (i === 0 ? ' on' : '') + '" data-id="' + l.id + '">' +
    '<div class="mini-lamp" style="--lamp-color:' + l.color + '"><span></span></div>' +
    '<div class="nm">' + l.name + (l.free ? '' : ' <span class="badge free">限免</span>') + '</div></div>').join('');
  pickEl.addEventListener('click', e => {
    const opt = e.target.closest('.lamp-opt');
    if (!opt) return;
    pickedLamp = LAMPS.find(l => l.id === opt.dataset.id);
    pickEl.querySelectorAll('.lamp-opt').forEach(el => el.classList.toggle('on', el === opt));
    previewInput();
  });

  /* 关系选择 */
  const whoChips = document.getElementById('who-chips');
  whoChips.addEventListener('click', e => {
    if (!e.target.classList.contains('chip')) return;
    whoChips.querySelectorAll('.chip').forEach(el => el.classList.toggle('on', el === e.target));
    previewInput();
  });
  document.getElementById('who-name').addEventListener('input', previewInput);
  document.getElementById('wish').addEventListener('input', previewInput);

  function lamps() { return WXG.Store.get('lamps', []); }

  function renderWall() {
    const list = lamps();
    document.getElementById('wall-empty').style.display = list.length ? 'none' : '';
    document.getElementById('wall-count').textContent = list.length ? '· 共 ' + list.length + ' 盏' : '';
    document.getElementById('wall').innerHTML = list.map((l, i) =>
      lampMarkup({ name: l.name, rel: l.rel, wish: l.wish, lampName: l.lampName, color: l.color, long: l.lampId === 'long' }, i, false)).join('');
  }

  function doLight() {
    const name = document.getElementById('who-name').value.trim();
    if (!name) { WXG.toast('写下名字或称呼，灯才有主人'); return; }
    const rel = whoChips.querySelector('.chip.on').textContent;
    const wish = document.getElementById('wish').value.trim() || pickedLamp.wish;

    const light = () => {
      const list = lamps();
      list.unshift({ name, rel, wish, lampName: pickedLamp.name, lampId: pickedLamp.id, color: pickedLamp.color, d: WXG.todayStr() });
      WXG.Store.set('lamps', list.slice(0, 48));
      renderWall();
      const firstLamp = document.querySelector('#wall .wish-lamp');
      if (firstLamp) {
        firstLamp.classList.add('just-lit');
        setTimeout(() => firstLamp.classList.remove('just-lit'), 1300);
      }
      WXG.Light.add(2, '点灯一盏');
      WXG.modal({
        title: '灯已点亮',
        body: '为「' + esc(name) + '」点的' + pickedLamp.name + '已挂上灯墙。<br>' + esc(wish) + '。',
        okText: '心安'
      });
      document.getElementById('who-name').value = '';
      document.getElementById('wish').value = '';
      previewInput();
    };

    if (!pickedLamp.free) {
      Premium.require(pickedLamp.product, light); /* 收费点：长明灯 */
    } else {
      light();
    }
  }

  document.getElementById('btn-light').addEventListener('click', doLight);
  previewInput();
  renderWall();
});
</script>
</body>
</html>
